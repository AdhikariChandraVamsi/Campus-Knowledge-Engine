name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: cke_user
          POSTGRES_PASSWORD: cke_pass
          POSTGRES_DB: cke_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test .env
        run: |
          cat > .env << 'ENVEOF'
          APP_NAME=CKE Test
          APP_ENV=test
          SECRET_KEY=test-secret-key-not-for-production
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          DATABASE_URL=postgresql://cke_user:cke_pass@localhost:5432/cke_db
          CHROMA_PERSIST_DIR=./chroma_store_test
          CHROMA_COLLECTION_NAME=test_chunks
          GEMINI_API_KEY=
          EMBEDDING_MODEL=all-MiniLM-L6-v2
          SIMILARITY_THRESHOLD=0.45
          UPLOAD_DIR=./uploads_test
          MAX_FILE_SIZE_MB=50
          ENVEOF

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cke-api:${{ github.sha }} .

      - name: Verify image runs
        run: |
          docker run --rm \
            -e SECRET_KEY=test \
            -e DATABASE_URL=postgresql://x:x@localhost/x \
            -e GEMINI_API_KEY= \
            cke-api:${{ github.sha }} \
            python -c "from app.main import app; print('✅ App imports successfully')"
